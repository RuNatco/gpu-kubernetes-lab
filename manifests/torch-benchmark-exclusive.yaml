apiVersion: batch/v1
kind: Job
metadata:
  name: torch-benchmark
  namespace: gpu-lab
spec:
  backoffLimit: 0
  template:
    metadata:
      labels:
        app: torch-benchmark
        mode: exclusive
    spec:
      restartPolicy: Never
      containers:
      - name: benchmark
        image: pytorch/pytorch:2.5.1-cuda12.4-cudnn9-runtime
        imagePullPolicy: IfNotPresent
        env:
        - name: MATRIX_SIZE
          value: "4096"
        - name: DURATION_SEC
          value: "300"
        - name: WARMUP_STEPS
          value: "10"
        command:
        - python
        - -c
        - |
          import os
          import time
          import torch

          matrix_size = int(os.getenv("MATRIX_SIZE", "4096"))
          duration_sec = int(os.getenv("DURATION_SEC", "300"))
          warmup_steps = int(os.getenv("WARMUP_STEPS", "10"))

          device = torch.device("cuda")

          print("gpu_name:", torch.cuda.get_device_name(0), flush=True)

          props = torch.cuda.get_device_properties(0)
          print("total_memory_gb:", round(props.total_memory / 1024**3, 2), flush=True)

          print("matrix_size:", matrix_size, flush=True)
          print("duration_sec:", duration_sec, flush=True)
          print("warmup_steps:", warmup_steps, flush=True)

          A = torch.randn((matrix_size, matrix_size), device=device)
          B = torch.randn((matrix_size, matrix_size), device=device)

          for _ in range(warmup_steps):
              C = torch.matmul(A, B)

          torch.cuda.synchronize()
          torch.cuda.reset_peak_memory_stats()

          times = []
          start_total = time.time()
          step = 0

          while time.time() - start_total < duration_sec:
              start = time.time()
              C = torch.matmul(A, B)
              torch.cuda.synchronize()
              end = time.time()

              times.append(end - start)
              step += 1

              if step % 20 == 0:
                  elapsed = time.time() - start_total
                  print("progress_step:", step, "elapsed_sec:", round(elapsed, 2), flush=True)

          total_time = time.time() - start_total

          print("steps_done:", len(times), flush=True)
          print("total_time_sec:", round(total_time, 2), flush=True)
          print("avg_step_sec:", round(sum(times) / len(times), 4), flush=True)
          print("min_step_sec:", round(min(times), 4), flush=True)
          print("max_step_sec:", round(max(times), 4), flush=True)
          print("peak_cuda_mem_gb:", round(torch.cuda.max_memory_allocated() / 1024**3, 2), flush=True)
        resources:
          limits:
            nvidia.com/gpu: 1
